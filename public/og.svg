<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(217,255,0,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- corner brackets -->
  <g stroke="#d9ff00" stroke-width="2" fill="none">
    <path d="M30 30 L30 60 M30 30 L60 30"/>
    <path d="M1170 30 L1170 60 M1170 30 L1140 30"/>
    <path d="M30 600 L30 570 M30 600 L60 600"/>
    <path d="M1170 600 L1170 570 M1170 600 L1140 600"/>
  </g>

  <!-- top eyebrow -->
  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#d9ff00" letter-spacing="4">
    <text x="60" y="80">▸ SOL/MEV LAB ▸ OPERATOR MNK-01 ▸ ON SHIFT</text>
  </g>

  <!-- main wordmark -->
  <g font-family="Stardos Stencil, Impact, sans-serif" letter-spacing="2" filter="url(#glow)">
    <text x="60" y="280" font-size="200" fill="#d9ff00">MEV</text>
    <text x="60" y="460" font-size="200" fill="#f4ead5">MONKEY<tspan fill="#d9ff00">.</tspan></text>
  </g>

  <!-- tagline strip -->
  <g>
    <rect x="60" y="500" width="640" height="44" fill="#d9ff00"/>
    <text x="80" y="531" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#0a0a0a" letter-spacing="2">▸ THE MONKEY EATS FIRST.</text>
  </g>

  <!-- right side: monkey portrait window -->
  <g transform="translate(800,80)">
    <rect width="340" height="340" fill="#0d1208" stroke="#d9ff00" stroke-width="2"/>
    <!-- HUD corners -->
    <g stroke="#d9ff00" stroke-width="2" fill="none">
      <path d="M0 20 L0 0 L20 0"/>
      <path d="M320 0 L340 0 L340 20"/>
      <path d="M0 320 L0 340 L20 340"/>
      <path d="M320 340 L340 340 L340 320"/>
    </g>
    <!-- monkey -->
    <image href="/operator.png" x="20" y="20" width="300" height="300" preserveAspectRatio="xMidYMid slice"/>
    <!-- id label top-left -->
    <text x="10" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#d9ff00" letter-spacing="3">ID ▸ MNK-01</text>
    <!-- live label bottom-right -->
    <circle cx="270" cy="328" r="4" fill="#d9ff00"/>
    <text x="282" y="332" font-family="JetBrains Mono, monospace" font-size="11" fill="#d9ff00" letter-spacing="3">ON SHIFT</text>
  </g>

  <!-- bottom status bar -->
  <g transform="translate(0,576)">
    <rect width="1200" height="34" fill="#0d1208"/>
    <rect width="120" height="34" fill="#d9ff00"/>
    <text x="22" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#0a0a0a" letter-spacing="3">● ON SHIFT</text>
    <text x="148" y="22" font-family="JetBrains Mono, monospace" font-size="12" fill="#f4ead5" letter-spacing="3">OP ▸ MNK-01 │ LAT ▸ 47ms │ BLOCK ▸ 312,449,182 │ NET ▸ SOLANA MAINNET</text>
  </g>
</svg>
